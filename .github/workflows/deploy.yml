name: Deploy TalentFlow to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: apex-internal-apps
  REGION: us-central1
  SERVICE: talentflow
  IMAGE: us-central1-docker.pkg.dev/apex-internal-apps/workflow-assistant/talentflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:latest \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "ENRICHLAYER_KEY=${{ secrets.ENRICHLAYER_KEY }}" \
            --port 8080 \
            --timeout 60

      - name: Output URL
        run: |
          URL=$(gcloud run services describe $SERVICE --region=$REGION --format='value(status.url)')
          echo "✅ TalentFlow live at: $URL"
